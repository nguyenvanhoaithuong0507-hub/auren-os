name: Build AuRen

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build AI Platform Dashboard
        run: |
          cd artifacts/ai-platform-dashboard
          pnpm build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-platform-dashboard
          path: artifacts/ai-platform-dashboard/dist
